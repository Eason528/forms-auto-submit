name: 定时提交问卷

on:
  schedule:
    - cron: '0 2 * * 2'
  workflow_dispatch:

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 安装依赖
        run: pip install -r requirements.txt
      - name: 运行脚本
        run: python forms_filler.py